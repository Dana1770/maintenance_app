name: maintenance_app
description: Maintenance App with Odoo Integration
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.1.0
  http: ^1.2.0
  share_plus: ^9.0.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.2
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  image_picker: ^1.0.7
  cached_network_image: ^3.3.0
  flutter_secure_storage: ^9.0.0
  geolocator: ^12.0.0
  intl: ^0.20.2
  dio: ^5.4.1
  flutter_animate: ^4.5.0
  url_launcher: ^6.2.5
  sqflite: ^2.3.2
  path: ^1.9.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
flutter_icons:
  android: true
  ios: true
  image_path: assets/maintenance.jpg

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/technician.png
    - assets/promo_banner.png
